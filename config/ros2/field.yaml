# Conservative same-LAN preview profile for this exact virtual stereo rig.
# Native acquisition and NEURAL depth remain HD1200 at 15 FPS. Only published
# previews are downscaled and throttled.
---
/**:
  ros__parameters:
    svo:
      use_svo_timestamps: true
      publish_svo_clock: false
      svo_loop: false
      svo_realtime: true

    general:
      grab_resolution: 'HD1200'
      grab_frame_rate: 15
      pub_resolution: 'CUSTOM'
      pub_downscale_factor: 2.0
      pub_frame_rate: 5.0
      enable_image_validity_check: 1

    video:
      enable_24bit_output: true
      publish_rgb: true
      publish_left_right: false
      publish_raw: false
      publish_gray: false
      publish_stereo: false

    sensors:
      publish_imu: false
      publish_imu_raw: false
      publish_cam_imu_transf: false
      publish_mag: false
      publish_baro: false
      publish_temp: false

    depth:
      depth_mode: 'NEURAL'
      # The rig is stationary and does not publish pose. Leaving the SDK
      # default (-1) silently forces positional tracking back on.
      depth_stabilization: 0
      point_cloud_freq: 2.0
      point_cloud_res: 'REDUCED'
      publish_depth_map: true
      publish_depth_info: false
      publish_point_cloud: true
      publish_depth_confidence: false
      publish_disparity: false

    pos_tracking:
      pos_tracking_enabled: false
      publish_tf: false
      publish_map_tf: false

    mapping:
      mapping_enabled: false

    object_detection:
      od_enabled: false

    body_tracking:
      bt_enabled: false

    stream_server:
      stream_enabled: false

    debug:
      sdk_verbose: 1
      disable_nitros: true
